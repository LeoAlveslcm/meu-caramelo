    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" type="text/css" href="/assets/css/index.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/registration.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="menu-section">
                <div class="menu-toggle">
                    <div class="one"></div>
                    <div class="two"></div>
                    <div class="three"></div>
                </div>
                <nav>
                    <ul class="menu-nav">
                        <li><a href="/">INÍCIO</a></li>
                        <li><a href="#section1">CADASTRAR</a></li>
                        <li><a href="#section2">ENCONTRE UM AMIGO</a></li>
                        <li><a href="#section3">SOBRE NÓS</a></li>
                        <li><a href="#section4">CONTATOS</a></li>
                    </ul>

                    <ul class="account">
                        <li><a href="login.html">LOGIN</a></li>
                        <li><a href="createAccount.html">COMEÇAR AGORA!</a></li>
                    </ul>
                </nav>
            </div>

            <div class="social-media">
                <a href=""><img src="assets/images/zap logo.png" alt="Logotipo do Wathsapp" width="20px"></a>
                <a href=""><img src="assets/images/insta logo.png" alt="Logotipo do Instagram" width="20px"></a>
                <a href="/"><img src="assets/images/Logo Icon.png" alt="Logo do site, cachorro segurando uma bola roxa." width="50px"></a>
            </div>

            <div class="box box1"></div>
            <div class="box box2"></div>
            
        </div>
        
    </header>

    <main>
        <div class="container">
            <div class="form">
                <form action="#">
                    <div class="form-header">
                        <div>
                            <h1>Cadastrar um Amigo</h1>
                            <p>Cadastre de forma rápida um animalzinho de rua.</p>
                        </div>

                        <img src="/assets/images/polaroid.png" alt="Foto polaroid de um cachorro." width="300px">
                    </div>
    
                    <div class="input-group">
                        <div class="img-div">
                            <label class="picture" tabindex="0">
                                <input type="file" accept="image/*" class="picture-input">
                                <span class="picture-img">Escolha uma imagem</span>
                            </label>
        
                            <div class="input-box">
                                <label for="name">Apelido</label>
                                <input id="name" type="text" name="name" placeholder="Digite o apelido">
                            </div>

                            <div class="check-box">
                                <div>
                                    <input type="radio" id="cat-check" name="animal-check" value="cat-check">
                                    <label for="cat-check">Gato</label>
                                </div>
                                <div>
                                    <input type="radio" id="dog-check" name="animal-check" value="dog-check">
                                    <label for="dog-check">Cachorro</label>
                                </div>                                
                            </div>
                        </div>

                        <div class="address-div">
                            <div class="double-box">
                                <div class="input-box">
                                    <label for="postal-code">CEP</label>
                                    <input id="postal-code" type="text" name="postal-code" placeholder="Digite o CEP">
                                </div>
        
                                <select name="states" id="states">
                                    <option value="">AC</option>
                                    <option value="">AL</option>
                                    <option value="">AP</option>
                                    <option value="">AM</option>
                                    <option value="">BA</option>
                                    <option value="">CE</option>
                                    <option value="">DF</option>
                                    <option value="">ES</option>
                                    <option value="">GO</option>
                                    <option value="">MA</option>
                                    <option value="">MT</option>
                                    <option value="">MS</option>
                                    <option value="">MG</option>
                                    <option value="">PA</option>
                                    <option value="">PB</option>
                                    <option value="">PR</option>
                                    <option value="">PE</option>
                                    <option value="">PI</option>
                                    <option value="">RJ</option>
                                    <option value="">RN</option>
                                    <option value="">RS</option>
                                    <option value="">RO</option>
                                    <option value="">RR</option>
                                    <option value="">SC</option>
                                    <option value="">SP</option>
                                    <option value="">SE</option>
                                    <option value="">TO</option>
                                </select>
                            </div>
                            
                            <div class="double-box">
                                <div class="input-box">
                                    <label for="address">Endereço</label>
                                    <input id="address" type="text" name="address" placeholder="Rua, avenida...">
                                </div>
            
                                <div class="input-box">
                                    <label for="number">Número</label>
                                    <input id="number" type="text" name="number" placeholder="Digite o número">
                                </div>
                            </div>
            
                            <div class="input-box">
                                <label for="complement">Complemento</label>
                                <input id="complement" type="text" name="complement" placeholder="Ex: Em frente ao...">
                            </div>
    
                            <div class="double-box">
                                <div class="input-box">
                                    <label for="neighborhood">Bairro</label>
                                    <input id="neighborhood" type="text" name="neighborhood" placeholder="Digite o bairro">
                                </div>
    
                                <div class="input-box">
                                    <label for="city">Cidade</label>
                                    <input id="city" type="text" name="city" placeholder="Digite a cidade">
                                </div>
                            </div>
                                
                            <div class="input-box discription">
                                <label for="discription">Explique pontos de referência, ou locais onde podemos encontra-lo:</label>
                                <textarea id="discription" type="text" name="discription"></textarea>
                            </div>
                        </div>
                    </div>
    
                    <button class="button"><a href="index.html">Cadastrar</a></button>
                </form>
            </div>
        </div>     
    </main>

    <footer>
        <nav>
            <ul>
                <li>Início</li>
                <li>Cadastrar</li>
                <li>Encontre um amigo</li>
                <li>Sobre nós</li>
            </ul>
        </nav>

        <ul>
            <li>Contatos</li>
            <li>minhaempresa@gmail.com</li>
            <li>(81) 98877-6655</li>
        </ul>

        <img src="assets/images/Logo Icon.png" alt="Desenho de um cachorro segurando uma bola roxa." width="60px">
     </footer>
</body>
</html>
