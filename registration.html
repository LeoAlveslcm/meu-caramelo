<body>
    <header>
        <div class="container">
            <div class="menu-section">
                <div class="menu-toggle">
                    <div class="one"></div>
                    <div class="two"></div>
                    <div class="three"></div>
                </div>
                <nav>
                    <ul class="menu-nav">
                        <li><a href="/">INÍCIO</a></li>
                        <li><a href="#section1">CADASTRAR</a></li>

                    </ul>

                    <ul class="account">
                        <li><a href="login.html">LOGIN</a></li>
                        <li><a href="createAccount.html">COMEÇAR AGORA!</a></li>
                    </ul>
                </nav>
            </div>

            <div class="social-media">
                <a href=""><img src="assets/images/zap logo.png" alt="Logotipo do Wathsapp" width="20px"></a>
                <a href=""><img src="assets/images/insta logo.png" alt="Logotipo do Instagram" width="20px"></a>
                <a href="/"><img src="assets/images/Logo Icon.png" alt="Logo do site, cachorro segurando uma bola roxa." width="50px"></a>
            </div>

            <div class="box box1"></div>
            <div class="box box2"></div>
            
        </div>
        
    </header>

    <main>
        <div class="container">
            <div class="form">
                <form action="#">
                    <div class="form-header">
                        <div>
                            <h1>Cadastrar um Amigo</h1>
                            <p>Cadastre de forma rápida um animalzinho de rua.</p>
                        </div>

                        <img src="/assets/images/polaroid.png" alt="Foto polaroid de um cachorro." width="300px">
                    </div>
    
                    <div class="input-group">
                        <div>
                            <label for="" tabindex="0">
                                <input type="file" accept="image/*">
                                <span></span>
                            </label>
        
                            <div class="input-box">
                                <label for="name">Apelido</label>
                                <input id="name" type="text" name="name" placeholder="Digite seu sobrenome">
                            </div>
                        </div>
                        
                        <div class="input-box">
                            <label for="mail">E-mail</label>
                            <input id="mail" type="text" name="mail" placeholder="Digite seu e-mail">
                        </div>
    
                        <div class="input-box">
                            <label for="phone-number">Telefone</label>
                            <input id="phone-number" type="text" name="phone-number" placeholder="(xx) xxxxx-xxxx">
                        </div>
    
                        <div class="input-box">
                            <label for="password">Senha</label>
                            <input id="password" type="text" name="password" placeholder="Digite seu senha">
                        </div>
    
                        <div class="input-box">
                            <label for="com-password">Confirme sua senha</label>
                            <input id="com-password" type="text" name="com-password" placeholder="Digite seu senha novamente">
                        </div>
                    </div>
    
                    <button class="button"><a href="index.html">Criar Conta</a></button>
                </form>
            </div>
        </div>     
    </main>

    <footer>
        <nav>
            <ul>
                <li>Início</li>
                <li>Cadastrar</li>
                <li>Encontre um amigo</li>
                <li>Sobre nós</li>
            </ul>
        </nav>

        <ul>
            <li>Contatos</li>
            <li>minhaempresa@gmail.com</li>
            <li>(81) 98877-6655</li>
        </ul>

        <img src="assets/images/Logo Icon.png" alt="Desenho de um cachorro segurando uma bola roxa." width="60px">
     </footer>
</body>
</html>
