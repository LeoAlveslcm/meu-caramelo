<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caramelo</title>
    <link rel="stylesheet" type="text/css" href="assets/css/createAcount.css">
</head>
<body>
    <div class="container">
        <img src="assets/images/createAccount vs1.png" alt="">

        <div class="form">
            <form action="#">
                <div class="form-header">
                    <h1>Crie sua conta</h1>
                    <ul>
                        <li>Já é cadastrado?</li>
                        <li><a href="login.html">Login</a></li>
                    </ul>
                </div>

                <div class="input-group">
                    <div class="input-box">
                        <label for="first-name">Nome</label>
                        <input id="first-name" type="text" name="first-name" placeholder="Digite seu nome">
                    </div>

                    <div class="input-box">
                        <label for="last-name">Sobre Nome</label>
                        <input id="last-name" type="text" name="last-name" placeholder="Digite seu sobrenome">
                    </div>

                    <div class="input-box">
                        <label for="mail">E-mail</label>
                        <input id="mail" type="text" name="mail" placeholder="Digite seu e-mail">
                    </div>

                    <div class="input-box">
                        <label for="phone-number">Telefone</label>
                        <input id="phone-number" type="text" name="phone-number" placeholder="(xx) xxxxx-xxxx">
                    </div>

                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="text" name="password" placeholder="Digite seu senha">
                    </div>

                    <div class="input-box">
                        <label for="com-password">Confirme sua senha</label>
                        <input id="com-password" type="text" name="com-password" placeholder="Digite seu senha novamente">
                    </div>
                </div>

                <button class="button"><a href="index.html">Criar Conta</a></button>
            </form>
        </div>
    </div>
</body>
</html>
